# Recommended local setup for Codex.
#
# The plugin package already bundles a local Nowledge Mem MCP server at
# http://127.0.0.1:14242/mcp/. Add an mcp_servers.nowledge-mem block only when
# you need to override that default, for example remote Mem or a custom port.

[features]
plugins = true
# Enables user/project lifecycle hooks. Current Codex builds use this key.
# Older builds may also accept codex_hooks = true; the setup script preserves it
# if it is already present.
hooks = true
# Current Codex loads hooks from enabled plugins automatically. Older Codex
# builds used a separate plugin_hooks feature gate; scripts/install_hooks.py
# detects that host capability and adds the legacy flag only when required.

[plugins."nowledge-mem@nowledge-community"]
enabled = true

# Keeps the packaged lifecycle hooks enabled in /hooks. On first install or
# after a hook changes, Codex will still ask you to review and trust it; enabled
# and trusted are separate security states.
[hooks.state."nowledge-mem@nowledge-community:hooks/hooks.json:session_start:0:0"]
enabled = true

[hooks.state."nowledge-mem@nowledge-community:hooks/hooks.json:user_prompt_submit:0:0"]
enabled = true

[hooks.state."nowledge-mem@nowledge-community:hooks/hooks.json:stop:0:0"]
enabled = true

# Optional Codex local Memory coexistence. The plugin does not change this
# user-owned setting. If you enable [features] memories = true, use this setting
# (or turn off "Allow memory generation from tool-assisted tasks" in Codex) so
# MCP and web results are not copied into Codex's separate local memory store.
#
# [memories]
# disable_on_external_context = true

# Remote/custom Mem override example:
# Generate this block from your saved nmem client config with:
# nmem config mcp show --host codex
#
# [mcp_servers.nowledge-mem]
# url = "https://mem.example.com/mcp/"
#
# [mcp_servers.nowledge-mem.http_headers]
# APP = "Codex"
# Authorization = "Bearer nmem_your_key"

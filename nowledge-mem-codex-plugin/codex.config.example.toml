# Recommended local setup for Codex.
#
# The plugin package already bundles a local Nowledge Mem MCP server at
# http://127.0.0.1:14242/mcp/. Add an mcp_servers.nowledge-mem block only when
# you need to override that default, for example remote Mem or a custom port.

[features]
plugins = true
# Enables user/project lifecycle hooks. Current Codex builds use this key.
# Older builds may also accept codex_hooks = true; the setup script preserves it
# if it is already present.
hooks = true
# Enables lifecycle hooks shipped by installed plugins, including this package's
# Stop hook. Codex may ask you to approve or toggle the hook from /hooks.
plugin_hooks = true

[plugins."nowledge-mem@nowledge-community"]
enabled = true

# Remote/custom Mem override example:
# Generate this block from your saved nmem client config with:
# nmem config mcp show --host codex
#
# [mcp_servers.nowledge-mem]
# url = "https://mem.example.com/mcp/"
#
# [mcp_servers.nowledge-mem.http_headers]
# APP = "Codex"
# Authorization = "Bearer nmem_your_key"

name: Validate Gemini Extension

on:
  pull_request:
    paths:
      - 'nowledge-mem-gemini-cli-extension/**'
      - '.github/workflows/validate-gemini-extension.yml'
      - '.github/workflows/release-gemini-extension.yml'
  push:
    branches:
      - main
      - dev
    paths:
      - 'nowledge-mem-gemini-cli-extension/**'
      - '.github/workflows/validate-gemini-extension.yml'
      - '.github/workflows/release-gemini-extension.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nowledge-mem-gemini-cli-extension

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate extension package
        run: npm run validate

      - name: Verify release packaging
        run: npm run package:release
